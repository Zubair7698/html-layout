<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Layout</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 10px;
      min-height: 100vh;
      padding: 10px;
    }

    header {
      background: #e8eef2;
      text-align: center;
      padding: 30px;
    }

    nav {
      background: #e8eef2;
      text-align: center;
      padding: 20px;
    }

    .content-area {
      display: grid;
      grid-template-columns: 1fr 3fr 1fr;
      gap: 10px;
    }

    aside {
      background: #e8eef2;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
    }

    main {
      background: #e8eef2;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    footer {
      background: #e8eef2;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <header>Header</header>

  <nav>Navigation Menu</nav>

  <div class="content-area">
    <aside>Content</aside>
    <main>Main Content</main>
    <aside>Content</aside>
  </div>

  <footer>Footer</footer>

</body>
</html>
